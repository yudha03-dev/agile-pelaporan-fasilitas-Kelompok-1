<!DOCTYPE html>
<html lang="en">
<head>

    <title>CampusFix - Register</title>
    <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>CampusFix</h1>
        <p>Buat Akun Baru</p>

        <form>

        <p>
            Sudah punya akun?
            <a href="login.html">Login</a>
        </p>
    </div>
