<!DOCTYPE html>
<html>
<head>
    <title>Riwayat Laporan</title>
    <style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
    margin-top:0;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2563eb;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#f9fafb;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

.status{
    padding:6px 12px;
    border-radius:20px;
    color:rgb(20, 20, 20);
    font-size:14px;
    font-weight:bold;
}

.dilaporkan{
    background:#dc2626;
}

.diproses{
    background:#f59e0b;
}

.selesai{
    background:#16a34a;
}

/* Modal */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.modal-content{
    background:white;
    width:500px;
    margin:100px auto;
    padding:20px;
    border-radius:10px;
}

.close{
    float:right;
    font-size:20px;
    cursor:pointer;
}

/* Tracking Status */
.tracking{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:20px;
}

.step{
    text-align:center;
}

.circle{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#d1d5db;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-weight:bold;
}

.line{
    width:80px;
    height:4px;
    background:#d1d5db;
}

.active .circle{
    background:#2563eb;
}

.active p{
    font-weight:bold;
    color:#2563eb;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Riwayat Laporan Saya</h2>

        <table>
<thead>
    <tr>
        <th>Judul</th>
        <th>Kategori</th>
        <th>Lokasi</th>
        <th>Urgensi</th>
        <th>Status</th>
        <th>Detail</th>
    </tr>
</thead>
            <tbody id="reportTable"></tbody>
        </table>
    </div>
</div>

<!-- Modal Detail -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>Detail Laporan</h3>

        <p><strong>Judul:</strong> <span id="detailJudul"></span></p>
<p><strong>Kategori:</strong> <span id="detailKategori"></span></p>
<p><strong>Lokasi:</strong> <span id="detailLokasi"></span></p>
<p><strong>Urgensi:</strong> <span id="detailUrgensi"></span></p>
<p><strong>Deskripsi:</strong> <span id="detailDeskripsi"></span></p>
        <h3>Status Laporan</h3>

        <div class="tracking">
            <div class="step" id="step1">
                <div class="circle">1</div>
                <p>Dilaporkan</p>
            </div>

            <div class="line"></div>

            <div class="step" id="step2">
                <div class="circle">2</div>
                <p>Diproses</p>
            </div>

            <div class="line"></div>

            <div class="step" id="step3">
                <div class="circle">3</div>
                <p>Selesai</p>
            </div>
        </div>
    </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

async function loadReports(){
    const response = await fetch("/api/reports/user/" + user.id);
    const reports = await response.json();

    document.getElementById("reportTable").innerHTML =
    reports.map(report => {
        let statusClass = "";

        if(report.status === "Dilaporkan"){
            statusClass = "dilaporkan";
        } 
        else if(report.status === "Diproses"){
            statusClass = "diproses";
        } 
        else if(report.status === "Selesai"){
            statusClass = "selesai";
        }

        return `
<tr>
    <td>${report.judul}</td>
    <td>${report.kategori}</td>
    <td>${report.lokasi}</td>
    <td>${report.urgensi}</td>
    <td>
        <span class="status ${statusClass}">
            ${report.status}
        </span>
    </td>
    <td>
        <button onclick='showDetail(${JSON.stringify(report)})'>
            Detail
        </button>
    </td>
</tr>
`;
    }).join("");
}

function showDetail(report){
    document.getElementById("detailJudul").innerText = report.judul;
    document.getElementById("detailKategori").innerText = report.kategori;
    document.getElementById("detailLokasi").innerText = report.lokasi;
    document.getElementById("detailUrgensi").innerText = report.urgensi;
    document.getElementById("detailDeskripsi").innerText = report.deskripsi;

    // reset semua step
    document.getElementById("step1").classList.remove("active");
    document.getElementById("step2").classList.remove("active");
    document.getElementById("step3").classList.remove("active");

    // aktifkan step sesuai status
    if(report.status === "Dilaporkan"){
        document.getElementById("step1").classList.add("active");
    }
    else if(report.status === "Diproses"){
        document.getElementById("step1").classList.add("active");
        document.getElementById("step2").classList.add("active");
    }
    else if(report.status === "Selesai"){
        document.getElementById("step1").classList.add("active");
        document.getElementById("step2").classList.add("active");
        document.getElementById("step3").classList.add("active");
    }

    document.getElementById("detailModal").style.display = "block";
}

function closeModal(){
    document.getElementById("detailModal").style.display = "none";
}

loadReports();
</script>

</body>
</html>
