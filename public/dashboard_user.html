<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Pelapor</title>
    <style>
        body{
            font-family:Arial;
            background:#f4f6f9;
            margin:0;
            padding:30px;
        }

        .container{
            max-width:1000px;
            margin:auto;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .menu{
            display:flex;
            gap:20px;
            justify-content:center;
        }

        .card{
            background:white;
            width:250px;
            padding:30px;
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            text-align:center;
        }

        button{
            margin-top:15px;
            background:#2563eb;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:6px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dashboard Pelapor</h1>

    <div class="menu">

        <div class="card">
            <h2>Buat Laporan</h2>
            <p>Kirim laporan baru</p>
            <button onclick="window.location.href='laporan.html'">
                Buat
            </button>
        </div>

        <div class="card">
            <h2>Riwayat Laporan</h2>
            <p>Lihat laporan anda</p>
            <button onclick="window.location.href='riwayat.html'">
                Lihat
            </button>
        </div>

    </div>
</div>

</body>
</html>
