<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin - CampusFix</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.container{
    width:95%;
    max-width:1400px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table thead{
    background:#2563eb;
    color:white;
}

table th,
table td{
    padding:12px;
    border:1px solid #ddd;
}

table tr:nth-child(even){
    background:#f9fafb;
}

.status{
    padding:6px 10px;
    border-radius:6px;
    color:white;
    font-size:13px;
}

.menunggu{
    background:#f59e0b;
}

.approved{
    background:#10b981;
}

.rejected{
    background:#ef4444;
}

.btn{
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    color:white;
    margin-right:5px;
}

.btn-approve{
    background:#10b981;
}

.btn-reject{
    background:#ef4444;
}

.btn-delete{
    background:#dc2626;
}

.info-box{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:25px;
}

.info-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    text-align:center;
}

.info-card h3{
    margin-bottom:10px;
}

.info-card p{
    font-size:28px;
    font-weight:bold;
    color:#2563eb;
}
</style>
</head>
<body>

<div class="header">
    <h1>Dashboard Admin CampusFix</h1>
</div>

<div class="container">

    <div class="info-box">
        <div class="info-card">
            <h3>Total Laporan</h3>
            <p id="total">0</p>
        </div>

        <div class="info-card">
            <h3>Disetujui</h3>
            <p id="approved">0</p>
        </div>

        <div class="info-card">
            <h3>Menunggu</h3>
            <p id="pending">0</p>
        </div>
    </div>

    <div class="card">

        <h2>Daftar Laporan</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Judul</th>
                    <th>Lokasi</th>
                    <th>Deskripsi</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="list"></tbody>
        </table>

    </div>

</div>

<script>
async function loadReports(){

    const res = await fetch("/api/reports");
    const data = await res.json();

    document.getElementById("total").innerText = data.length;
    document.getElementById("approved").innerText =
        data.filter(x => x.status === "approved").length;
    document.getElementById("pending").innerText =
        data.filter(x => x.status === "menunggu").length;

    document.getElementById("list").innerHTML =
    data.map(r => `
        <tr>
            <td>${r.id}</td>
            <td>${r.judul}</td>
            <td>${r.lokasi}</td>
            <td>${r.deskripsi}</td>

            <td>
                <span class="status ${r.status}">
                    ${r.status}
                </span>
            </td>

            <td>
                <button class="btn btn-approve"
                    onclick="updateStatus(${r.id},'approved')">
                    Approve
                </button>

                <button class="btn btn-reject"
                    onclick="updateStatus(${r.id},'rejected')">
                    Reject
                </button>

                <button class="btn btn-delete"
                    onclick="deleteReport(${r.id})">
                    Delete
                </button>
            </td>
        </tr>
    `).join("");
}

async function updateStatus(id,status){

    await fetch("/api/reports/"+id,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({status})
    });

    loadReports();
}

async function deleteReport(id){

    const confirmDelete = confirm("Yakin ingin menghapus laporan?");
    if(!confirmDelete) return;

    const res = await fetch("/api/reports/" + id,{
        method:"DELETE"
    });

    const data = await res.json();
    alert(data.message);

    loadReports();
}

loadReports();
</script>

</body>
</html>
