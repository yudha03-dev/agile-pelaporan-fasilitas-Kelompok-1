<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin - CampusFix</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.container{
    width:95%;
    max-width:1400px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:20px;
}

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table thead{
    background:#2563eb;
    color:white;
}

table th,
table td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

table tr:nth-child(even){
    background:#f9fafb;
}

.status{
    padding:6px 10px;
    border-radius:6px;
    color:white;
    font-size:13px;
}

.Dilaporkan{
    background:#dc2626;
}

.Diproses{
    background:#f59e0b;
}

.Selesai{
    background:#16a34a;
}

.btn{
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    color:white;
    margin:3px;
}

.btn-proses{
    background:#f59e0b;
}

.btn-selesai{
    background:#16a34a;
}

.btn-delete{
    background:#dc2626;
}

.info-box{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:25px;
}

.info-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    text-align:center;
}

.info-card h3{
    margin-bottom:10px;
}

.info-card p{
    font-size:28px;
    font-weight:bold;
    color:#2563eb;
}
</style>
</head>
<body>

<div class="header">
    <h1>Dashboard Admin CampusFix</h1>
</div>

<div class="container">

    <div class="info-box">
        <div class="info-card">
            <h3>Total Laporan</h3>
            <p id="total">0</p>
        </div>

        <div class="info-card">
            <h3>Selesai</h3>
            <p id="selesai">0</p>
        </div>

        <div class="info-card">
            <h3>Dilaporkan</h3>
            <p id="pending">0</p>
        </div>
    </div>

    <div class="card">
        <h2>Daftar Laporan</h2>

        <div class="search-box">
            <input 
                type="text"
                id="searchInput"
                placeholder="Cari laporan berdasarkan ID, Judul, Kategori, Lokasi, Status..."
                onkeyup="searchReports()"
            >
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Judul</th>
                    <th>Kategori</th>
                    <th>Lokasi</th>
                    <th>Deskripsi</th>
                    <th>Urgensi</th>
                    <th>Foto</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="list"></tbody>
        </table>
    </div>

</div>

<script>
let allReports = [];

async function loadReports(){
    const res = await fetch("/api/reports");
    allReports = await res.json();

    document.getElementById("total").innerText = allReports.length;
    document.getElementById("selesai").innerText =
        allReports.filter(x => x.status === "Selesai").length;
    document.getElementById("pending").innerText =
        allReports.filter(x => x.status === "Dilaporkan").length;

    renderTable(allReports);
}

function renderTable(data){
    document.getElementById("list").innerHTML =
    data.map(r => `
        <tr>
            <td>${r.id}</td>
            <td>${r.judul}</td>
            <td>${r.kategori}</td>
            <td>${r.lokasi}</td>
            <td>${r.deskripsi}</td>
            <td>${r.urgensi}</td>

            <td>
    ${
        r.foto
        ? `<img src="${r.foto}" width="100" style="border-radius:8px;">`
        : `Tidak ada`
    }
</td>

            <td>
                <span class="status ${r.status}">
                    ${r.status}
                </span>
            </td>

            <td>
                <button class="btn btn-proses"
                    onclick="updateStatus(${r.id}, 'Diproses')">
                    Proses
                </button>

                <button class="btn btn-selesai"
                    onclick="updateStatus(${r.id}, 'Selesai')">
                    Selesai
                </button>

                <button class="btn btn-delete"
                    onclick="deleteReport(${r.id})">
                    Delete
                </button>
            </td>
        </tr>
    `).join("");
}

function searchReports(){
    const keyword = document
        .getElementById("searchInput")
        .value
        .toLowerCase();

    const filtered = allReports.filter(report =>
        report.id.toString().includes(keyword) ||
        report.judul.toLowerCase().includes(keyword) ||
        report.kategori.toLowerCase().includes(keyword) ||
        report.lokasi.toLowerCase().includes(keyword) ||
        report.status.toLowerCase().includes(keyword)
    );

    renderTable(filtered);
}

async function updateStatus(id, status){
    await fetch("/api/reports/" + id,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({status})
    });

    loadReports();
}

async function deleteReport(id){
    const confirmDelete = confirm("Yakin ingin menghapus laporan?");
    if(!confirmDelete) return;

    await fetch("/api/reports/" + id,{
        method:"DELETE"
    });

    loadReports();
}

loadReports();
</script>

</body>
</html>
