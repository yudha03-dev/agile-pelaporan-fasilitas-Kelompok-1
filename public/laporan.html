<!DOCTYPE html>
<html>
<head>
    <title>Buat Laporan</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
    margin-top:0;
    margin-bottom:20px;
    color:#2563eb;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<div class="container">
<div class="card">

<h2>Kirim Laporan Baru</h2>

<form id="reportForm">

    <input
        type="text"
        id="judul"
        placeholder="Judul Laporan"
        required>

    <select id="kategori" required>
        <option value="">Pilih Kategori Kerusakan</option>
        <option value="Lampu Rusak">Lampu Rusak</option>
        <option value="AC Rusak">AC Rusak</option>
        <option value="Kursi Rusak">Kursi Rusak</option>
        <option value="Toilet Rusak">Toilet Rusak</option>
        <option value="Proyektor Rusak">Proyektor Rusak</option>
        <option value="Lainnya">Lainnya</option>
    </select>

    <input
        type="text"
        id="lokasi"
        placeholder="Contoh: Gedung A Ruang 203"
        required>

    <textarea
        id="deskripsi"
        placeholder="Jelaskan kronologi kerusakan..."
        required></textarea>

    <select id="urgensi" required>
        <option value="">Pilih Tingkat Urgensi</option>
        <option value="Tinggi">Tinggi</option>
        <option value="Sedang">Sedang</option>
        <option value="Rendah">Rendah</option>
    </select>

    <button type="submit">
        Kirim Laporan
    </button>

</form>

</div>
</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

document.getElementById("reportForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const response = await fetch("/api/reports",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            user_id:user.id,
            judul:document.getElementById("judul").value,
            kategori:document.getElementById("kategori").value,
            lokasi:document.getElementById("lokasi").value,
            deskripsi:document.getElementById("deskripsi").value,
            urgensi:document.getElementById("urgensi").value
        })
    });

    const data = await response.json();

    alert(data.message);

});

</script>

</body>
</html>
