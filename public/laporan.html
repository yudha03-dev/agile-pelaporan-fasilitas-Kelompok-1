<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusFix - Buat Laporan</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
    margin-top:0;
    margin-bottom:20px;
    color:#2563eb;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
    resize:vertical;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#1d4ed8;
}

#preview{
    display:none;
    max-width:250px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #ddd;
    padding:5px;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>Kirim Laporan Baru</h2>

<form id="reportForm">

    <input
        type="text"
        id="judul"
        placeholder="Judul Laporan"
        required>

    <select id="kategori" required>
        <option value="">Pilih Kategori Kerusakan</option>
        <option>Lampu Rusak</option>
        <option>AC Rusak</option>
        <option>Kursi Rusak</option>
        <option>Toilet Rusak</option>
        <option>Lainnya</option>
    </select>

    <input
        type="text"
        id="lokasi"
        placeholder="Contoh: Gedung A Lantai 2"
        required>

    <textarea
        id="deskripsi"
        placeholder="Jelaskan kronologi kerusakan..."
        required>
    </textarea>

    <select id="urgensi" required>
        <option value="">Pilih Tingkat Urgensi</option>
        <option>Tinggi</option>
        <option>Sedang</option>
        <option>Rendah</option>
    </select>

    <label>Upload Foto Bukti Kerusakan</label>

    <input
        type="file"
        id="foto"
        accept="image/*">

    <img id="preview">

    <button type="submit">
        Kirim Laporan
    </button>

</form>

</div>
</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

const fotoInput = document.getElementById("foto");
const preview = document.getElementById("preview");

fotoInput.addEventListener("change", () => {

    const file = fotoInput.files[0];

    if(file){
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }

});

document.getElementById("reportForm")
.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData();

    formData.append("user_id", user.id);
    formData.append("judul", document.getElementById("judul").value);
    formData.append("kategori", document.getElementById("kategori").value);
    formData.append("lokasi", document.getElementById("lokasi").value);
    formData.append("deskripsi", document.getElementById("deskripsi").value);
    formData.append("urgensi", document.getElementById("urgensi").value);

    if (fotoInput.files[0]) {
        formData.append("foto", fotoInput.files[0]);
    }

    const response = await fetch("/api/reports", {
        method: "POST",
        body: formData
    });

    const data = await response.json();
    alert(data.message);
});

</script>

</body>
</html>
